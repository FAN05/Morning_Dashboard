<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morning">
<title>Morning Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #0f0f12; color: #e8e8f0; min-height: 100vh; padding: 20px 16px 48px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .greeting { font-size: 22px; font-weight: 600; color: #e8e8f0; margin-bottom: 2px; }
  .dateline { font-size: 12px; color: #5a5a6e; }
  .hamburger { background: none; border: none; cursor: pointer; padding: 4px; display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
  .hamburger span { display: block; width: 20px; height: 1.5px; background: #5a5a6e; border-radius: 2px; }
  .hamburger:active span { background: #e8e8f0; }

  /* Section labels */
  .section-label { font-size: 10px; font-weight: 700; color: #4a4a60; letter-spacing: 0.1em; text-transform: uppercase; margin: 18px 0 7px; display: flex; justify-content: space-between; align-items: center; }
  .refresh-btn { font-size: 12px; color: #378ADD; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; text-transform: none; letter-spacing: 0; font-weight: 400; }

  /* Base card */
  .card { background: #1a1a22; border: 0.5px solid #252530; border-radius: 16px; margin-bottom: 8px; overflow: hidden; }
  .card-pad { padding: 13px 15px; }
  .row-divider { border: none; border-top: 0.5px solid #20202c; margin: 0; }
  .muted { color: #7a7a8c; font-size: 13px; padding: 13px 15px; display: block; }

  /* Weather */
  .weather-card { background: #141c28; border: 0.5px solid #1e2e44; border-radius: 16px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .weather-icon { font-size: 34px; flex-shrink: 0; }
  .weather-desc { font-size: 13px; color: #c0cce0; font-weight: 500; }
  .weather-sub { font-size: 11px; color: #5a7a9a; margin-top: 3px; }
  .weather-badge { display: inline-block; margin-top: 5px; font-size: 10px; background: #1a2a3e; color: #7ab8e8; border-radius: 20px; padding: 2px 8px; }
  .weather-temp { font-size: 30px; font-weight: 600; color: #e8e8f0; flex-shrink: 0; }

  /* Schedule rows */
  .lesson-row { display: flex; align-items: center; gap: 10px; padding: 11px 15px; }
  .l-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .l-dot-now  { background: #97C459; box-shadow: 0 0 0 3px rgba(151,196,89,0.18); }
  .l-dot-next { background: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,0.18); }
  .l-dot-done { background: #2a2a3a; }
  .l-time { font-size: 11px; color: #4a4a62; width: 36px; flex-shrink: 0; }
  .l-name { font-size: 13px; font-weight: 500; color: #e8e8f0; flex: 1; line-height: 1.3; }
  .l-name-done { color: #4a4a62; font-weight: 400; }
  .l-room { font-size: 11px; color: #4a4a62; margin-top: 1px; }
  .now-badge { font-size: 9px; font-weight: 600; background: rgba(151,196,89,0.14); color: #97C459; border-radius: 20px; padding: 2px 7px; flex-shrink: 0; }
  .free-day { font-size: 13px; color: #5a5a6e; padding: 13px 15px; }

  /* Leave CTA */
  .cta { background: #101e10; border: 0.5px solid #1c341c; border-radius: 16px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; }
  .cta-icon { font-size: 26px; flex-shrink: 0; }
  .cta-time { font-size: 26px; font-weight: 700; color: #97C459; line-height: 1; }
  .cta-desc { font-size: 11px; color: #4a7a4a; margin-top: 3px; line-height: 1.4; }

  /* Transit rows */
  .dep-row { display: flex; align-items: center; gap: 9px; padding: 10px 15px; }
  .line-pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; min-width: 32px; text-align: center; flex-shrink: 0; }
  .dep-dest { flex: 1; font-size: 12px; color: #7a7a8c; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .dep-time { font-size: 13px; color: #e8e8f0; font-weight: 500; }
  .dep-min { font-size: 11px; color: #4a4a62; min-width: 36px; text-align: right; }
  .stop-label { font-size: 10px; font-weight: 600; color: #4a4a62; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 15px 4px; }

  /* Mensa rows */
  .mensa-row { display: flex; align-items: center; gap: 10px; padding: 9px 15px; }
  .mensa-cat { font-size: 10px; font-weight: 700; color: #4a4a62; text-transform: uppercase; letter-spacing: 0.07em; width: 54px; flex-shrink: 0; }
  .mensa-name { font-size: 12px; color: #b0b0c4; flex: 1; line-height: 1.3; }

  /* Exam rows */
  .exam-row { display: flex; align-items: center; gap: 8px; padding: 11px 15px 6px; }
  .exam-name { font-size: 13px; font-weight: 500; color: #e8e8f0; flex: 1; }
  .exam-date { font-size: 11px; color: #4a4a62; padding: 0 15px 4px; }
  .badge { font-size: 10px; padding: 2px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .badge-red   { background: #3a1515; color: #f09595; }
  .badge-amber { background: #2a1e08; color: #FAC775; }
  .badge-green { background: #152415; color: #97C459; }
  .exam-prog { height: 2px; background: #1e1e2a; margin: 0 15px 10px; border-radius: 2px; overflow: hidden; }
  .exam-prog-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  /* Drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 10; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: #111118; border-left: 0.5px solid #252530; transition: right 0.28s cubic-bezier(0.19,1,0.22,1); z-index: 11; overflow-y: auto; padding-bottom: 40px; }
  .drawer.open { right: 0; }
  .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 22px 16px 16px; border-bottom: 0.5px solid #252530; }
  .drawer-title { font-size: 16px; font-weight: 600; color: #e8e8f0; }
  .drawer-close { background: none; border: none; color: #5a5a6e; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; }
  .drawer-section { padding: 16px 16px 0; }
  .drawer-section-label { font-size: 10px; font-weight: 700; color: #4a4a60; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .drawer-card { background: #1a1a22; border: 0.5px solid #252530; border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
  .drawer-row { display: flex; align-items: center; padding: 11px 14px; gap: 10px; border-bottom: 0.5px solid #20202c; }
  .drawer-row:last-child { border-bottom: none; }
  .drawer-row-label { font-size: 13px; color: #e8e8f0; flex: 1; }
  .drawer-row-sub { font-size: 11px; color: #5a5a6e; margin-top: 1px; }
  .drawer-day { font-size: 11px; font-weight: 700; color: #4a4a62; width: 26px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.05em; }
  .drawer-input { background: #0f0f18; border: 0.5px solid #252530; border-radius: 6px; padding: 5px 8px; color: #e8e8f0; font-size: 13px; width: 100%; outline: none; font-family: inherit; }
  .drawer-input:focus { border-color: #378ADD; }
</style>
</head>
<body>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Menü</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>

  <!-- STUNDENPLAN -->
  <div class="drawer-section">
    <div class="drawer-section-label">Stundenplan</div>
    <div class="drawer-card" id="drawer-schedule"></div>
  </div>

  <!-- EINSTELLUNGEN -->
  <div class="drawer-section">
    <div class="drawer-section-label">Einstellungen</div>
    <div class="drawer-card">
      <div class="drawer-row">
        <div style="flex:1">
          <div class="drawer-row-label">Name</div>
          <div class="drawer-row-sub">Wird in der Begrüßung angezeigt</div>
        </div>
        <input class="drawer-input" style="width:110px" id="setting-name" value="Anton" onchange="saveSetting('name', this.value); updateGreeting();">
      </div>
      <div class="drawer-row">
        <div style="flex:1">
          <div class="drawer-row-label">Fußweg U4 (Min.)</div>
          <div class="drawer-row-sub">Böhmerwaldplatz</div>
        </div>
        <input class="drawer-input" style="width:60px" type="number" id="setting-walk-u4" value="15" onchange="saveSetting('walkU4', this.value); STOPS.u4.walk = parseInt(this.value);">
      </div>
      <div class="drawer-row">
        <div style="flex:1">
          <div class="drawer-row-label">Fußweg Bus 59 (Min.)</div>
          <div class="drawer-row-sub">Zaubzerstraße</div>
        </div>
        <input class="drawer-input" style="width:60px" type="number" id="setting-walk-bus" value="5" onchange="saveSetting('walkBus', this.value); STOPS.bus.walk = parseInt(this.value);">
      </div>
    </div>
  </div>
</div>

<div class="header">
  <div>
    <div class="greeting" id="greeting">–</div>
    <div class="dateline" id="dateline">–</div>
  </div>
  <button class="hamburger" onclick="openDrawer()" aria-label="Menü öffnen">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- WETTER -->
<div class="section-label">Wetter</div>
<div class="weather-card" id="weather-card"><span class="muted">Wird geladen…</span></div>

<!-- STUNDENPLAN -->
<div class="section-label">Heute</div>
<div class="card" id="schedule-card"><span class="muted">Wird geladen…</span></div>

<!-- LOSMARSCHIEREN -->
<div class="section-label">Losmarschieren</div>
<div class="cta" id="cta-card">
  <div class="cta-icon">🚶</div>
  <div>
    <div class="cta-time" id="leave-time">–</div>
    <div class="cta-desc" id="leave-desc">–</div>
  </div>
</div>

<!-- ÖPNV -->
<div class="section-label"><span>Abfahrten</span><button class="refresh-btn" onclick="renderOepnv()">↺ Aktualisieren</button></div>
<div class="card" id="u4-card"></div>
<div class="card" id="bus-card"></div>

<!-- MENSA -->
<div class="section-label"><span>Mensa Leopoldstraße</span><button class="refresh-btn" onclick="renderMensa()">↺ Aktualisieren</button></div>
<div class="card" id="mensa-card"><span class="muted">Wird geladen…</span></div>

<!-- KLAUSUREN -->
<div class="section-label">Klausuren</div>
<div class="card" id="exams-card"><span class="muted">Wird berechnet…</span></div>

<script>
// ─── DATEN ───────────────────────────────────────────────
const DAYS   = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

const SCHEDULE = {
  'Montag': [
    { time: '10:00', end: '12:00', name: 'Fiwi II Lecture', room: 'Geschwister-Scholl-Pl. 1 (B) – B 201' },
    { time: '12:00', end: '14:00', name: 'Marketing Vorlesung', room: 'Geschwister-Scholl-Pl. 1 (A) – Audi Max (A030)' },
  ],
  'Dienstag': [],
  'Mittwoch': [
    { time: '10:00', end: '12:00', name: 'International Trade Lecture', room: 'Schellingstr. 3 (S) – S 002' },
    { time: '16:00', end: '18:00', name: 'Marketing Übung', room: 'Zoom' },
  ],
  'Donnerstag': [
    { time: '12:00', end: '14:00', name: 'Fiwi II Tutorial', room: 'Geschwister-Scholl-Pl. 1 (D) – D 209' },
    { time: '16:00', end: '18:00', name: 'International Trade Tutorial', room: 'Geschwister-Scholl-Pl. 1 (M) – M 105' },
  ],
  'Freitag':   [],
  'Samstag':   [],
  'Sonntag':   [],
};

const EXAMS = [
  { name: 'International Trade',              date: new Date(2026, 6, 15,  8, 30), room: 'wird noch bekanntgegeben' },
  { name: 'Macroeconomics 2',                 date: new Date(2026, 6, 22, 13,  0), room: 'wird noch bekanntgegeben' },
  { name: 'Marketing-Management',             date: new Date(2026, 6, 23,  8, 30), room: 'wird noch bekanntgegeben' },
  { name: 'Statistik 2',                        date: new Date(2026, 6,  4, 13, 30), room: 'TU München' },
  { name: 'Taxation and the Welfare State',   date: new Date(2026, 6, 24,  8, 30), room: 'wird noch bekanntgegeben' },
];

// ─── INIT ────────────────────────────────────────────────
const now = new Date();
const todayName = DAYS[now.getDay()];

document.getElementById('greeting').textContent =
  now.getHours() < 11 ? 'Guten Morgen, Anton' :
  now.getHours() < 17 ? 'Guten Tag, Anton' : 'Guten Abend, Anton';
document.getElementById('dateline').textContent =
  `${todayName}, ${now.getDate()}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

// ─── STUNDENPLAN ─────────────────────────────────────────
function renderSchedule() {
  const lessons = SCHEDULE[todayName] || [];
  const card = document.getElementById('schedule-card');
  if (!lessons.length) {
    card.innerHTML = '<div class="free-day">Heute keine Veranstaltungen 🎉</div>';
    return;
  }
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const nextIdx = lessons.findIndex(l => {
    const [sh, sm] = l.time.split(':').map(Number);
    return sh * 60 + sm > nowMin;
  });
  card.innerHTML = lessons.map((l, i) => {
    const [sh, sm] = l.time.split(':').map(Number);
    const [eh, em] = l.end.split(':').map(Number);
    const start = sh * 60 + sm, end = eh * 60 + em;
    const past    = end < nowMin;
    const current = start <= nowMin && nowMin < end;
    const isNext  = i === nextIdx;
    const dotClass = current ? 'l-dot l-dot-now' : isNext ? 'l-dot l-dot-next' : 'l-dot l-dot-done';
    return `
      ${i > 0 ? '<hr class="row-divider">' : ''}
      <div class="lesson-row">
        <div class="l-dot ${current ? 'l-dot-now' : isNext ? 'l-dot-next' : 'l-dot-done'}"></div>
        <div class="l-time">${l.time}</div>
        <div style="flex:1">
          <div class="l-name ${past ? 'l-name-done' : ''}">${l.name}</div>
          <div class="l-room">${l.room}</div>
        </div>
        ${current ? '<span class="now-badge">Jetzt</span>' : ''}
      </div>`;
  }).join('');
}
renderSchedule();

// ─── KLAUSUREN ────────────────────────────────────────────
function renderExams() {
  const upcoming = EXAMS.filter(e => e.date > now).sort((a, b) => a.date - b.date);
  const card = document.getElementById('exams-card');
  if (!upcoming.length) { card.innerHTML = '<span class="muted">Keine anstehenden Klausuren.</span>'; return; }
  const maxDays = Math.max(...upcoming.map(e => Math.ceil((e.date - now) / 86400000)));
  card.innerHTML = upcoming.map((e, i) => {
    const days = Math.ceil((e.date - now) / 86400000);
    const cls  = days <= 14 ? 'badge-red' : days <= 28 ? 'badge-amber' : 'badge-green';
    const barColor = days <= 14 ? '#f09595' : days <= 28 ? '#FAC775' : '#97C459';
    const barWidth = Math.max(8, Math.round((1 - days / maxDays) * 100));
    const d = e.date;
    return `
      ${i > 0 ? '<hr class="row-divider">' : ''}
      <div class="exam-row">
        <div class="exam-name">${e.name}</div>
        <span class="badge ${cls}">in ${days}d</span>
      </div>
      <div class="exam-date">${DAYS[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} Uhr · ${e.room}</div>
      <div class="exam-prog"><div class="exam-prog-fill" style="width:${barWidth}%;background:${barColor}"></div></div>`;
  }).join('');
}
renderExams();

// ─── WETTER ──────────────────────────────────────────────
const WMO = {
  0:'Klar', 1:'Überwiegend klar', 2:'Teilweise bewölkt', 3:'Bedeckt',
  45:'Nebel', 48:'Nebel', 51:'Leichter Nieselregen', 53:'Nieselregen', 55:'Starker Nieselregen',
  61:'Leichter Regen', 63:'Regen', 65:'Starker Regen',
  71:'Leichter Schnee', 73:'Schnee', 75:'Starker Schnee',
  80:'Regenschauer', 81:'Regenschauer', 82:'Starke Regenschauer',
  95:'Gewitter', 96:'Gewitter', 99:'Starkes Gewitter'
};
const WMO_ICON = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
  45:'🌫️', 48:'🌫️', 51:'🌦️', 53:'🌦️', 55:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};

async function renderWeather() {
  const card = document.getElementById('weather-card');
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=48.1351&longitude=11.582&current=temperature_2m,weathercode,precipitation,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Europe%2FBerlin&forecast_days=1';
    const res  = await fetch(url);
    const data = await res.json();
    const c    = data.current;
    const d    = data.daily;
    const code = c.weathercode;
    const desc = WMO[code] || 'Unbekannt';
    const icon = WMO_ICON[code] || '🌡️';
    const temp = Math.round(c.temperature_2m);
    const tmax = Math.round(d.temperature_2m_max[0]);
    const tmin = Math.round(d.temperature_2m_min[0]);
    const rain = d.precipitation_sum[0];
    const wind = Math.round(c.windspeed_10m);
    const jacket = rain > 0.5 ? '<span class="weather-badge">Regenjacke mitnehmen</span>' : '';
    card.innerHTML = `
      <div class="weather-icon">${icon}</div>
      <div style="flex:1">
        <div class="weather-desc">${desc}</div>
        <div class="weather-sub">${tmin}° / ${tmax}° · Wind ${wind} km/h · ${rain} mm</div>
        ${jacket}
      </div>
      <div class="weather-temp">${temp}°</div>`;
  } catch(e) {
    card.innerHTML = '<span class="muted">Wetter nicht verfügbar</span>';
  }
}
renderWeather();

// ─── MENSA ───────────────────────────────────────────────
async function renderMensa(retry = 0) {
  const card = document.getElementById('mensa-card');
  try {
    const res   = await fetch(`${PROXY_URL}/mensa`);
    if (!res.ok) throw new Error(res.status);
    const meals = await res.json();
    if (!meals.length) {
      card.innerHTML = '<div class="muted">Heute kein Speiseplan verfügbar.</div>';
      return;
    }
    card.innerHTML = meals.map((m, i) => `
      ${i > 0 ? '<hr class="row-divider">' : ''}
      <div class="mensa-row">
        <div class="mensa-cat">${m.category}</div>
        <div class="mensa-name">${m.name}</div>
      </div>`).join('');
  } catch(e) {
    if (retry < 2) {
      card.innerHTML = '<div class="muted">Lädt… (Proxy startet)</div>';
      setTimeout(() => renderMensa(retry + 1), 8000);
    } else {
      card.innerHTML = '<div class="muted">Mensa nicht verfügbar – <button class="refresh-btn" onclick="renderMensa()">↺ Erneut versuchen</button></div>';
    }
  }
}
renderMensa();

// ─── ÖPNV (Live via Proxy) ──────────────────────────────
// PROXY_URL wird nach Render-Deployment eingetragen
const PROXY_URL = 'https://morning-dashboard-8z2u.onrender.com';

const STOPS = {
  u4:  { globalId: 'de:09162:560',  label: 'U4 → Westend',           line: 'U4', pillBg: '#00A984', walk: 15, dest: 'Westendstraße', destAlt: 'Laimer Platz', destAlt2: 'Theresienwiese' },
  bus: { globalId: 'de:09162:663', label: 'Bus 59 → Ackermannbogen', line: '59', pillBg: '#005A95', walk: 5,  dest: 'Ackermannbogen', destAlt: null },
};

function fmtTime(d) {
  return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}
function fmtMin(d) {
  const diff = Math.round((d - new Date()) / 60000);
  return diff <= 0 ? 'jetzt' : diff + ' min';
}

async function fetchStop(key) {
  const s = STOPS[key];
  const card = document.getElementById(key + '-card');
  try {
    const res  = await fetch(`${PROXY_URL}/departures?globalId=${s.globalId}&limit=20`);
    const all  = await res.json();
    const deps = all.filter(d => d.label && d.label.toString().includes(s.line) && (d.destination === s.dest || d.destination === s.destAlt || d.destination === s.destAlt2)).slice(0, 4);
    if (!deps.length) { card.innerHTML = `<div class="muted">Keine Abfahrten.</div>`; return []; }
    card.innerHTML = `<div class="stop-label">${s.label}</div>` +
      deps.map((d, i) => {
        const t = new Date(d.realtimeDepartureTime || d.plannedDepartureTime);
        return `${i > 0 ? '<hr class="row-divider">' : ''}
          <div class="dep-row">
            <span class="line-pill" style="background:${s.pillBg};color:#fff">${d.label}</span>
            <span class="dep-dest">${d.destination}</span>
            <span class="dep-time">${fmtTime(t)}</span>
            <span class="dep-min">${fmtMin(t)}</span>
          </div>`;
      }).join('');
    return deps.map(d => new Date(d.realtimeDepartureTime || d.plannedDepartureTime));
  } catch(e) {
    card.innerHTML = `<div class="muted">Verbinde… (Proxy startet, bitte 30s warten und aktualisieren)</div>`;
    return [];
  }
}

async function renderOepnv() {
  const now2 = new Date();
  const day  = now2.getDay(); // 0=So,1=Mo,2=Di,3=Mi,4=Do,5=Fr,6=Sa
  const useU4  = [1, 3].includes(day); // Mo, Mi
  const useBus = [2, 4, 5, 6, 0].includes(day); // Di, Do, Fr, Sa, So

  const [u4Times, busTimes] = await Promise.all([fetchStop('u4'), fetchStop('bus')]);

  const findNext = (times, walk) => times.find(t => (t.getTime() - walk * 60000) >= now2.getTime()) || null;

  const candidates = [];
  if (useU4)  { const t = findNext(u4Times,  STOPS.u4.walk);  if (t) candidates.push({ leave: new Date(t.getTime() - STOPS.u4.walk  * 60000), linie: 'U4 → Böhmerwaldplatz (15 Min. Fußweg)' }); }
  if (useBus) { const t = findNext(busTimes, STOPS.bus.walk); if (t) candidates.push({ leave: new Date(t.getTime() - STOPS.bus.walk * 60000), linie: 'Bus 59 → Zaubzerstraße (5 Min. Fußweg)' }); }

  if (!candidates.length) {
    document.getElementById('leave-time').textContent = '–';
    document.getElementById('leave-desc').textContent = 'Keine weiteren Abfahrten';
    return;
  }

  candidates.sort((a,b) => a.leave - b.leave);
  const best = candidates[0];
  const minLeft = Math.round((best.leave - now2) / 60000);

  document.getElementById('leave-time').textContent = fmtTime(best.leave) + ' Uhr';
  document.getElementById('leave-desc').textContent =
    minLeft > 0 ? `In ${minLeft} Min. → ${best.linie}` :
                  `Jetzt sofort → ${best.linie}`;
}

renderOepnv();
setInterval(renderOepnv, 30000);

// ─── DRAWER ──────────────────────────────────────────────
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderDrawerSchedule();
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderDrawerSchedule() {
  const container = document.getElementById('drawer-schedule');
  const allDays = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'];
  let html = '';
  allDays.forEach(day => {
    const lessons = SCHEDULE[day] || [];
    if (!lessons.length) {
      html += `<div class="drawer-row"><span class="drawer-day">${day.slice(0,2)}</span><span class="drawer-row-sub">Keine Veranstaltungen</span></div>`;
    } else {
      lessons.forEach((l, i) => {
        html += `<div class="drawer-row">
          <span class="drawer-day">${i === 0 ? day.slice(0,2) : ''}</span>
          <div style="flex:1"><div class="drawer-row-label">${l.name}</div><div class="drawer-row-sub">${l.time}–${l.end} · ${l.room}</div></div>
        </div>`;
      });
    }
  });
  container.innerHTML = html;
}

// ─── EINSTELLUNGEN ───────────────────────────────────────
function saveSetting(key, val) {
  try { localStorage.setItem('dashboard_' + key, val); } catch(e) {}
}
function loadSettings() {
  const name   = localStorage.getItem('dashboard_name');
  const walkU4 = localStorage.getItem('dashboard_walkU4');
  const walkBus= localStorage.getItem('dashboard_walkBus');
  if (name)    document.getElementById('setting-name').value = name;
  if (walkU4)  { document.getElementById('setting-walk-u4').value = walkU4; STOPS.u4.walk = parseInt(walkU4); }
  if (walkBus) { document.getElementById('setting-walk-bus').value = walkBus; STOPS.bus.walk = parseInt(walkBus); }
}
function updateGreeting() {
  const name = document.getElementById('setting-name').value || 'Anton';
  const h = new Date().getHours();
  document.getElementById('greeting').textContent =
    h < 11 ? `Guten Morgen, ${name}` : h < 17 ? `Guten Tag, ${name}` : `Guten Abend, ${name}`;
}
loadSettings();

// ─── BENACHRICHTIGUNGEN ──────────────────────────────────
async function setupNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  if (Notification.permission !== 'granted') return;

  const lessons = SCHEDULE[todayName] || [];
  const now2 = new Date();

  lessons.forEach(l => {
    const [h, m] = l.time.split(':').map(Number);
    const lectureTime = new Date(now2);
    lectureTime.setHours(h, m, 0, 0);

    const notifyTime = new Date(lectureTime.getTime() - 10 * 60000);
    const msUntil = notifyTime - now2;

    if (msUntil > 0) {
      setTimeout(() => {
        new Notification('Bald gehts los', {
          body: `${l.name} beginnt in 10 Minuten (${l.time} Uhr)`,
          icon: '/favicon.ico',
          silent: false,
        });
      }, msUntil);
    }
  });
}
setupNotifications();
