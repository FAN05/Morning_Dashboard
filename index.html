<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morning">
<title>Morning Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: #0f0f12; color: #e8e8f0; min-height: 100vh; padding: 20px 16px 40px; }
  .greeting { font-size: 24px; font-weight: 600; color: #e8e8f0; margin-bottom: 3px; }
  .dateline { font-size: 13px; color: #7a7a8c; margin-bottom: 24px; }
  .section-label { font-size: 11px; font-weight: 600; color: #5a5a6e; letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 8px; margin-top: 20px; }
  .card { background: #1a1a22; border: 0.5px solid #2a2a36; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .divider { border: none; border-top: 0.5px solid #2a2a36; margin: 10px 0; }
  .muted { color: #7a7a8c; font-size: 13px; }

  /* Schedule */
  .lesson-row { display: flex; gap: 10px; align-items: flex-start; }
  .lesson-time { font-size: 12px; color: #5a5a6e; width: 44px; flex-shrink: 0; padding-top: 2px; }
  .now-dot { width: 7px; height: 7px; border-radius: 50%; background: #97C459; margin-top: 4px; flex-shrink: 0; }
  .spacer-dot { width: 7px; flex-shrink: 0; }
  .lesson-name { font-size: 14px; font-weight: 500; color: #e8e8f0; line-height: 1.3; }
  .lesson-room { font-size: 12px; color: #5a5a6e; margin-top: 2px; }

  /* ÖPNV */
  .dep-row { display: flex; align-items: center; gap: 8px; }
  .line-pill { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 6px; min-width: 36px; text-align: center; flex-shrink: 0; }
  .dep-dest { flex: 1; font-size: 13px; color: #7a7a8c; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .dep-time { font-size: 13px; color: #e8e8f0; }
  .dep-min { font-size: 12px; color: #7a7a8c; min-width: 38px; text-align: right; }
  .stop-label { font-size: 11px; color: #5a5a6e; margin-bottom: 8px; }
  .refresh-btn { font-size: 12px; color: #378ADD; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; float: right; }

  /* Leave card */
  .cta { background: #1a2a1a; border: 0.5px solid #2a3a2a; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .cta-time { font-size: 30px; font-weight: 600; color: #97C459; }
  .cta-label { font-size: 12px; color: #639922; margin-top: 3px; }
  .walk-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .walk-input { background: #12121a; border: 0.5px solid #2a2a36; border-radius: 6px; padding: 5px 8px; color: #e8e8f0; font-size: 13px; width: 46px; text-align: center; outline: none; font-family: inherit; }

  /* Exams */
  .exam-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .exam-name { font-size: 14px; font-weight: 500; color: #e8e8f0; }
  .exam-meta { font-size: 12px; color: #7a7a8c; margin-top: 2px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .badge-red { background: #3a1a1a; color: #f09595; }
  .badge-amber { background: #2a2010; color: #FAC775; }
  .badge-green { background: #1a2a1a; color: #C0DD97; }

  /* No lessons */
  .free-day { font-size: 14px; color: #7a7a8c; }
</style>
</head>
<body>

<div class="greeting" id="greeting">–</div>
<div class="dateline" id="dateline">–</div>

<!-- STUNDENPLAN -->
<div class="section-label">Heute</div>
<div class="card" id="schedule-card"><div class="muted">Wird geladen…</div></div>

<!-- ÖPNV -->
<div class="section-label" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;margin-top:20px;">
  <span>Abfahrten</span>
  <button class="refresh-btn" onclick="renderOepnv()">↺ Aktualisieren</button>
</div>
<div class="card" id="u4-card"></div>
<div class="card" id="bus-card"></div>

<!-- LOSMARSCHIEREN -->
<div id="leave-section">
  <div class="section-label">Wann losmarschieren?</div>
  <div class="cta">
    <div class="cta-time" id="leave-time">–</div>
    <div class="cta-label" id="leave-desc">–</div>
    <div style="margin-top:8px;font-size:12px;color:#5a5a6e;">
      U4: 15 Min. Fußweg zum Böhmerwaldplatz &nbsp;·&nbsp; Bus 59: 5 Min. zur Zaubzerstraße
    </div>
  </div>
</div>

<!-- KLAUSUREN -->
<div class="section-label">Klausuren</div>
<div class="card" id="exams-card"><div class="muted">Wird berechnet…</div></div>

<script>
// ─── DATEN ───────────────────────────────────────────────
const DAYS   = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

const SCHEDULE = {
  'Montag': [
    { time: '10:00', end: '12:00', name: 'Fiwi II Lecture', room: 'Geschwister-Scholl-Pl. 1 (B) – B 201' },
    { time: '12:00', end: '14:00', name: 'Marketing Vorlesung', room: 'Geschwister-Scholl-Pl. 1 (A) – Audi Max (A030)' },
  ],
  'Dienstag': [],
  'Mittwoch': [
    { time: '10:00', end: '12:00', name: 'International Trade Lecture', room: 'Schellingstr. 3 (S) – S 002' },
  ],
  'Donnerstag': [
    { time: '10:00', end: '11:00', name: 'Marketing Übung', room: 'Prof.-Huber-Pl. 2 (W) – LEHRTURM-W201' },
    { time: '12:00', end: '14:00', name: 'Fiwi II Tutorial', room: 'Geschwister-Scholl-Pl. 1 (D) – D 209' },
    { time: '16:00', end: '18:00', name: 'International Trade Tutorial', room: 'Geschwister-Scholl-Pl. 1 (M) – M 105' },
  ],
  'Freitag':   [],
  'Samstag':   [],
  'Sonntag':   [],
};

const EXAMS = [
  { name: 'International Trade',              date: new Date(2026, 6, 15,  8, 30), room: 'wird noch bekanntgegeben' },
  { name: 'Macroeconomics 2',                 date: new Date(2026, 6, 22, 13,  0), room: 'wird noch bekanntgegeben' },
  { name: 'Marketing-Management',             date: new Date(2026, 6, 23,  8, 30), room: 'wird noch bekanntgegeben' },
  { name: 'Taxation and the Welfare State',   date: new Date(2026, 6, 24,  8, 30), room: 'wird noch bekanntgegeben' },
];

// ─── INIT ────────────────────────────────────────────────
const now = new Date();
const todayName = DAYS[now.getDay()];

document.getElementById('greeting').textContent =
  now.getHours() < 11 ? 'Guten Morgen 🌅' :
  now.getHours() < 17 ? 'Guten Tag ☀️' : 'Guten Abend 🌙';
document.getElementById('dateline').textContent =
  `${todayName}, ${now.getDate()}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

// ─── STUNDENPLAN ─────────────────────────────────────────
function renderSchedule() {
  const lessons = SCHEDULE[todayName] || [];
  const card = document.getElementById('schedule-card');
  if (!lessons.length) {
    card.innerHTML = '<div class="free-day">Heute keine Veranstaltungen 🎉</div>';
    return;
  }
  const nowMin = now.getHours() * 60 + now.getMinutes();
  card.innerHTML = lessons.map((l, i) => {
    const [sh, sm] = l.time.split(':').map(Number);
    const [eh, em] = l.end.split(':').map(Number);
    const start = sh * 60 + sm, end = eh * 60 + em;
    const past    = end < nowMin;
    const current = start <= nowMin && nowMin < end;
    return `
      ${i > 0 ? '<hr class="divider">' : ''}
      <div class="lesson-row" style="opacity:${past ? '0.4' : '1'}">
        <div class="lesson-time">${l.time}</div>
        ${current ? '<div class="now-dot"></div>' : '<div class="spacer-dot"></div>'}
        <div>
          <div class="lesson-name">${l.name}</div>
          <div class="lesson-room">${l.room}</div>
        </div>
      </div>`;
  }).join('');
}
renderSchedule();

// ─── KLAUSUREN ────────────────────────────────────────────
function renderExams() {
  const upcoming = EXAMS.filter(e => e.date > now).sort((a, b) => a.date - b.date);
  const card = document.getElementById('exams-card');
  if (!upcoming.length) { card.innerHTML = '<div class="muted">Keine anstehenden Klausuren.</div>'; return; }
  card.innerHTML = upcoming.map((e, i) => {
    const days = Math.ceil((e.date - now) / 86400000);
    const cls  = days <= 7 ? 'badge-red' : days <= 21 ? 'badge-amber' : 'badge-green';
    const d    = e.date;
    return `
      ${i > 0 ? '<hr class="divider">' : ''}
      <div class="exam-row">
        <div class="exam-name">${e.name}</div>
        <span class="badge ${cls}">in ${days} Tagen</span>
      </div>
      <div class="exam-meta">
        ${DAYS[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]} ·
        ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} Uhr ·
        ${e.room}
      </div>`;
  }).join('');
}
renderExams();

// ─── ÖPNV (Live via Proxy) ──────────────────────────────
// PROXY_URL wird nach Render-Deployment eingetragen
const PROXY_URL = 'https://morning-dashboard-8z2u.onrender.com';

const STOPS = {
  u4:  { globalId: 'de:09162:490', label: 'U4 → Westend',          line: 'U4', pillBg: '#00A984', walk: 15, dest: 'Westend' },
  bus: { globalId: 'de:09162:1480', label: 'Bus 59 → Ackermannbogen', line: '59', pillBg: '#005A95', walk: 5,  dest: 'Ackermannbogen' },
};

function fmtTime(d) {
  return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}
function fmtMin(d) {
  const diff = Math.round((d - new Date()) / 60000);
  return diff <= 0 ? 'jetzt' : diff + ' min';
}

async function fetchStop(key) {
  const s = STOPS[key];
  const card = document.getElementById(key + '-card');
  try {
    const res  = await fetch(`${PROXY_URL}/departures?globalId=${s.globalId}&limit=10`);
    const all  = await res.json();
    const deps = all.filter(d => d.label && d.label.toString().includes(s.line)).slice(0, 4);
    if (!deps.length) { card.innerHTML = `<div class="muted">Keine Abfahrten.</div>`; return null; }
    card.innerHTML = `<div class="stop-label">${s.label}</div>` +
      deps.map((d, i) => {
        const t = new Date(d.realtimeDepartureTime || d.plannedDepartureTime);
        return `${i > 0 ? '<hr class="divider">' : ''}
          <div class="dep-row">
            <span class="line-pill" style="background:${s.pillBg};color:#fff">${d.label}</span>
            <span class="dep-dest">${s.dest}</span>
            <span class="dep-time">${fmtTime(t)}</span>
            <span class="dep-min">${fmtMin(t)}</span>
          </div>`;
      }).join('');
    return new Date(deps[0].realtimeDepartureTime || deps[0].plannedDepartureTime);
  } catch(e) {
    card.innerHTML = `<div class="muted">Proxy nicht erreichbar.</div>`;
    return null;
  }
}

async function renderOepnv() {
  const [nextU4, nextBus] = await Promise.all([fetchStop('u4'), fetchStop('bus')]);

  // Losmarschieren: für jede Linie eigener Fußweg
  const candidates = [];
  if (nextU4)  candidates.push(new Date(nextU4.getTime()  - STOPS.u4.walk  * 60000));
  if (nextBus) candidates.push(new Date(nextBus.getTime() - STOPS.bus.walk * 60000));
  if (!candidates.length) return;

  candidates.sort((a,b) => a - b);
  const leave = candidates[0];
  const isU4  = nextU4 && leave.getTime() === (nextU4.getTime() - STOPS.u4.walk * 60000);
  const minLeft = Math.round((leave - new Date()) / 60000);
  const linie = isU4 ? `U4 (15 Min. Fußweg zum Böhmerwaldplatz)` : `Bus 59 (5 Min. Fußweg zur Zaubzerstraße)`;

  document.getElementById('leave-time').textContent = fmtTime(leave) + ' Uhr';
  document.getElementById('leave-desc').textContent =
    minLeft > 0  ? `In ${minLeft} Min. los → ${linie}` :
    minLeft === 0 ? `Jetzt sofort losgehen → ${linie}` :
                   `Verpasst – nächste Abfahrt wählen`;
}

renderOepnv();
setInterval(renderOepnv, 30000);
</script>
</body>
</html>
